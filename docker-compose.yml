services:
  # Local Emulators streaming 4G telematics data via HTTPS to the production server at api-smartcar.prstart.hu
  
  # 1. Emulator: Mercedes-Benz GL 320 CDI
  emulator-mercedes:
    build:
      context: ./emulator
      dockerfile: Dockerfile
    container_name: smartcar-emulator-mercedes
    restart: always
    environment:
      - TARGET_API_HOST=api-smartcar.prstart.hu
      - DEVICE_ID=ESP32_W164_001
      - VIN=WDC1648221A491726
      - CAR_NAME=Mercedes-Benz GL 320 CDI (W164)
      - LAT_OFFSET=0
      - LNG_OFFSET=0

  # 2. Emulator: Renault Fluence
  emulator-renault:
    build:
      context: ./emulator
      dockerfile: Dockerfile
    container_name: smartcar-emulator-renault
    restart: always
    environment:
      - TARGET_API_HOST=api-smartcar.prstart.hu
      - DEVICE_ID=ESP32_FLUENCE_002
      - VIN=VF1LZ0B0541234567
      - CAR_NAME=Renault Fluence 1.5 dCi
      - LAT_OFFSET=0.012
      - LNG_OFFSET=-0.015

  # 3. Emulator: BMW 530d E60
  emulator-bmw:
    build:
      context: ./emulator
      dockerfile: Dockerfile
    container_name: smartcar-emulator-bmw
    restart: always
    environment:
      - TARGET_API_HOST=api-smartcar.prstart.hu
      - DEVICE_ID=ESP32_E60_003
      - VIN=WBANX31000C123456
      - CAR_NAME=BMW 530d (E60)
      - LAT_OFFSET=-0.018
      - LNG_OFFSET=0.020
